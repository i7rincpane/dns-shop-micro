openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/v1/users:
    get:
      tags:
      - user-controller
      operationId: getAllByFilter
      parameters:
      - name: filter
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/UserSearchRequest"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      tags:
      - user-controller
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/User"
  /api/v1/users/{id}:
    get:
      tags:
      - user-controller
      operationId: getById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserFullInfo"
    patch:
      tags:
      - user-controller
      operationId: update
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserProfile"
components:
  schemas:
    RegistrationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          maxLength: 2147483647
          minLength: 8
        name:
          type: string
          minLength: 1
        surname:
          type: string
        phone:
          type: string
        birthdate:
          type: string
          format: date
      required:
      - email
      - name
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        password:
          type: string
        role:
          type: string
    UserUpdateDto:
      type: object
      properties:
        name:
          type: string
        surname:
          type: string
        phone:
          type: string
        birthdate:
          type: string
          format: date
    UserProfile:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        name:
          type: string
        surname:
          type: string
        phone:
          type: string
        birthdate:
          type: string
          format: date
        version:
          type: integer
          format: int64
    UserSearchRequest:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
        namePart:
          type: string
    UserFullInfo:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        name:
          type: string
        surname:
          type: string
