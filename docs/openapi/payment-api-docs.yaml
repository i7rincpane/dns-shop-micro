openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:8085
  description: Generated server url
paths:
  /api/v1/payments:
    post:
      tags:
      - payment-controller
      operationId: handleWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankResponse"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Payment"
components:
  schemas:
    BankResponse:
      type: object
      properties:
        orderId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        amount:
          type: number
        status:
          type: string
          enum:
          - PENDING
          - SUCCESS
          - FAILED
    Payment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        orderId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - PENDING
          - SUCCESS
          - FAILED
        amount:
          type: number
        createdAt:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
