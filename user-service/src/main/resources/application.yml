spring:
  application:
    name: user-service

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/user_service_db
    username: postgres
    password: postgres

  messages:
    encoding: UTF-8

  liquibase:
    url: jdbc:postgresql://localhost:5432/user_service_db
    user: postgres
    password: postgres
    change-log: classpath:db/changelog/db.changelog-master.yaml

logging:
  level:
    org.springframework.r2dbc: DEBUG

